<!DOCTYPE html>
<html>
<head>
    <title>IG Name Changer</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 50px auto; text-align: center; }
        input, textarea { width: 100%; margin-bottom: 10px; padding: 8px; }
        .status { padding: 20px; background: #eee; margin-top: 20px; }
        #startBtn { background: green; color: white; padding: 10px 20px; }
        #stopBtn { background: red; color: white; padding: 10px 20px; }
    </style>
</head>
<body>
    <h1>IG Name Changer</h1>
    <input type="text" id="sid" placeholder="Session ID">
    <textarea id="names" placeholder="Names (comma separated): Name1, Name2, Name3"></textarea>
    <input type="number" id="delay" placeholder="Delay between changes (seconds)" value="60">
    <input type="number" id="break_after" placeholder="Break after how many changes?" value="5">
    <input type="number" id="break_duration" placeholder="Break duration (seconds)" value="600">
    
    <button id="startBtn" onclick="startTask()">Start</button>
    <button id="stopBtn" onclick="stopTask()">Stop</button>

    <div class="status">
        <strong>Status:</strong> <span id="log">Waiting...</span>
    </div>

    <script>
        function startTask() {
            const data = {
                sid: document.getElementById('sid').value,
                names: document.getElementById('names').value,
                delay: document.getElementById('delay').value,
                break_after: document.getElementById('break_after').value,
                break_duration: document.getElementById('break_duration').value
            };
            fetch('/start', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)});
        }

        function stopTask() {
            fetch('/stop', {method: 'POST'});
        }

        setInterval(() => {
            fetch('/status').then(res => res.json()).then(data => {
                document.getElementById('log').innerText = data.log;
            });
        }, 2000);
    </script>
</body>
</html>
